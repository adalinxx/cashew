name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        shell: bash
        run: |
          set +e
          set -o pipefail
          swift test > "$RUNNER_TEMP/swift-test.log" 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Swift failure summary"
            grep -nE 'error:|failed|XCTAssert|Test Case .* failed' "$RUNNER_TEMP/swift-test.log" | tail -100 || tail -100 "$RUNNER_TEMP/swift-test.log"
            echo "::endgroup::"
            exit "$status"
          fi
          tail -40 "$RUNNER_TEMP/swift-test.log"
      - name: Upload Swift diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-log
          path: |
            ${{ runner.temp }}/swift-test.log
            Tests/cashewTests/VolumeMerkleDictionaryTests.swift
          if-no-files-found: error
